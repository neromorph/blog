name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://blog.nmrooms.biz.id

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  validate:
    name: Validate Output
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Validate sitemap
        run: test -f dist/sitemap-0.xml && echo "✓ sitemap.xml exists"

      - name: Validate robots.txt
        run: test -f dist/robots.txt && echo "✓ robots.txt exists"

      - name: Validate RSS
        run: test -f dist/rss.xml && echo "✓ rss.xml exists"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          languages: typescript
